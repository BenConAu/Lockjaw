# Stack analysis annotations for indirect calls (BLR instructions).
#
# Every function containing a BLR must be listed here with its known
# call targets. The xtask check-stack command FAILS if any BLR site
# is unannotated. No silent underestimation.
#
# When adding a new kernel thread, add its entry function here.

[indirect_calls]

# Residual core::fmt from panic_bounds_check / slice_index_fail
# (release) and debug_assert! paths (debug). Only reachable on
# panics or debug assertions. BLR instructions dispatch through
# Formatter internals — unresolvable but bounded stack usage.
"core::fmt::write" = "fmt-internal"
"<core::fmt::Formatter>::pad" = "fmt-internal"
"<core::fmt::Formatter>::pad_integral" = "fmt-internal"
"<core::fmt::Formatter>::pad_integral::write_prefix" = "fmt-internal"
"<core::fmt::Arguments as core::fmt::Display>::fmt" = "fmt-internal"
"<core::fmt::Formatter>::debug_tuple_field1_finish" = "fmt-internal"
"<core::fmt::builders::PadAdapter as core::fmt::Write>::write_char" = "fmt-internal"
"<core::fmt::builders::PadAdapter as core::fmt::Write>::write_str" = "fmt-internal"
"<usize as core::fmt::Display>::fmt" = "fmt-internal"
"<&str as core::fmt::Display>::fmt" = "fmt-internal"

# donate_one_kernel_page (NK3) dispatches through an `impl FnOnce`
# init_fn parameter; each instantiation gets a separate symbol per
# the closure that monomorphises into it. The create_kernel_object_kvm
# wrapper's closure ultimately calls one of the three IPC-object
# factories via the underlying init_fn: fn(ObjectInitPage) — write
# one fixed-size header into the donated page, then map_existing
# exposes the same frame at a KVA so the new handle slot can carry
# `HandleKind::{Endpoint, Notification, Reply} { kva }`.
#
# create_kernel_object_kvm itself still contains a BLR at the
# init_fn fn-pointer call inside its closure body (the closure
# captures init_fn: fn(ObjectInitPage)); the same 3 factories are
# the only possible targets.
"lockjaw::syscall::handler::create_kernel_object_kvm" = [
    "lockjaw::ipc::endpoint::create_endpoint",
    "lockjaw::ipc::notification::create_notification",
    "lockjaw::ipc::reply::create_reply",
]
"lockjaw::syscall::handler::donate_one_kernel_page::<lockjaw::syscall::handler::create_kernel_object_kvm::{closure#0}>" = [
    "lockjaw::ipc::endpoint::create_endpoint",
    "lockjaw::ipc::notification::create_notification",
    "lockjaw::ipc::reply::create_reply",
]


# Thread entry trampoline calls the thread's entry function via blr x19.
# All possible targets listed here. boot_tcb_entry_unreachable is the
# CPU 0 boot TCB's entry slot — never reachable in practice (boot TCB
# has no synthetic SavedContext, no context_switch INTO it), but listed
# so check-stack accepts it as a known target if the disassembler still
# sees the function pointer.
"thread_entry" = ["boot_tcb_entry_unreachable", "process_entry"]

# Cycles involving the crash handler are guarded at runtime by an
# AtomicBool re-entry flag in print_thread_context. The call graph
# edges still exist (panic paths call print_thread_context which
# uses formatting that the compiler sees as potentially panicking),
# but the runtime guard prevents actual recursion.
# Manually verified stack sizes for assembly-only functions.
# emit-stack-sizes only covers Rust code; these are measured from
# the assembly source. The checker validates every symbol here
# exists in the disassembly — if a symbol is renamed/deleted, the
# check fails.
[known_assembly]
# Exception vector stubs: SAVE_REGS allocates EXCEPTION_FRAME_SIZE
# = size_of::<ExceptionContext>() = 288 bytes (31 GPRs + ELR + SPSR
# + ESR + SP_EL0 + TPIDR_EL0 = 36 × 8).
"__vec_sync" = 288
"__vec_irq" = 288
"__vec_fiq" = 288
"__vec_serror" = 288
"__vec_sync_lower" = 288
# context_switch: sub sp, sp, #624 for SavedContext = 12 callee-saved
# GPRs (x19–x30, 96 B) + FPCR/FPSR (16 B) + v0..v31 (32 × 16 = 512 B).
# 624 = 39 × 16 keeps SP 16-aligned for the q-form stp/ldp. Switches
# stacks mid-function; the 624 bytes remain allocated on the old
# thread's stack until that thread is next dispatched.
"context_switch" = 624
# thread_entry: trampoline that calls blr x19. No stack allocation.
"thread_entry" = 0
# _start: sets SP from linker symbol, no frame allocation.
"_start" = 0
# _secondary_start: sets per-CPU SP, no frame allocation.
"_secondary_start" = 0
# _pivot_to_higher_half: adds KERNEL_VA_OFFSET to SP/FP/LR, no frame.
"_pivot_to_higher_half" = 0

# Compiler builtins — leaf functions, no stack frame.
"memcpy" = 0
"memset" = 0
"memcmp" = 0
"memmove" = 0
"compiler_builtins::mem::memmove" = 0

# LLVM code de-duplication artifact. Small outlined sequences.
"OUTLINED_FUNCTION_0" = 0

# Cortex-A53 erratum 843419 linker-inserted trampoline. The linker
# emits these stubs (named `__CortexA53843419_<patched_va_hex>`) to
# work around a CPU prefetch bug near specific page boundaries. The
# stub is a 4-instruction veneer: load + branch, no stack frame.
# The hex suffix is the patched address and changes whenever the
# kernel image layout shifts, so we match by prefix via the `*`
# wildcard support in xtask's check-stack lookup.
"__CortexA53843419_*" = 0

# Core library functions from the precompiled sysroot (no
# emit-stack-sizes). Conservative upper bounds. The proper long-term
# fix is -Zbuild-std so core is rebuilt with our rustflags.
# Panic/abort paths — divergent, never return. Stack usage doesn't
# combine with further callees, but frames still exist on the stack.
"core::panicking::panic" = 128
"core::panicking::panic_fmt" = 128
"core::panicking::panic_nounwind_fmt" = 128
"core::panicking::panic_bounds_check" = 128
"core::panicking::assert_failed_inner" = 128
"core::panicking::panic_misaligned_pointer_dereference" = 64
"core::panicking::panic_null_pointer_dereference" = 64
"core::panicking::panic_const::panic_const_add_overflow" = 64
"core::panicking::panic_const::panic_const_mul_overflow" = 64
"core::panicking::panic_const::panic_const_shl_overflow" = 64
"core::panicking::panic_const::panic_const_sub_overflow" = 64
"core::option::unwrap_failed" = 128
"core::option::expect_failed" = 128
"core::result::unwrap_failed" = 128
"core::slice::index::slice_index_fail" = 128
# core::panicking::assert_failed is generic — the checker resolves
# the monomorphized instances via .llvm. suffix stripping.
"core::panicking::assert_failed" = 128
# core::fmt::write — drives formatting via fn pointers. Moderate frame.
"core::fmt::write" = 128

[allowed_cycles]
# print_thread_context has a runtime AtomicBool re-entry guard.
"lockjaw::crash::print_thread_context" = true
# The panic handler calls pl011.puts() + KPrint, which the compiler
# sees as potentially panicking again. Not real recursion.
"__rustc::rust_begin_unwind" = true

[allowed_vtables]
# Compiler jump table inside GIC init (match on GIC version).
# The "+" suffix restricts to intra-function offsets (jump table
# entries), not function pointers to gic::init itself.
"gic::init+" = "compiler jump table"
"process_obj::process_handle_table+" = "compiler jump table"
"pl011::Pl011>::puts" = "kprintln infrastructure function pointer"

# Specific Debug::fmt impls pulled in by assert_eq! in the kernel.
# Each new type requires its own entry — keeps the gate narrow.
"<&lockjaw_types::object::ObjectType as core::fmt::Debug>::fmt" = "assert_eq panic formatting"
"<&u64 as core::fmt::Debug>::fmt" = "assert_eq panic formatting"
"<&usize as core::fmt::Debug>::fmt" = "assert_eq panic formatting (kvm boot self-test pages count)"
"<lockjaw::mm::kvm::KvmError as core::fmt::Debug>::fmt" = "Result::expect on alloc_kernel_pages failures"
