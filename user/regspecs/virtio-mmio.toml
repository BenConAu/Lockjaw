# VirtIO MMIO transport (modern spec — virtio v1.x).
#
# Generates user/lockjaw-regs/src/virtio_mmio.rs via `cargo xtask gen-regs`.
# Driver: user/virtio-blk-driver (Phase 3 convert target).
#
# Reference: VirtIO 1.2 spec section 4.2.2.
#
# Phase 3 scope: this file covers the transport registers plus the
# virtio-blk-specific config-space capacity registers at offset 0x100.
# That keeps the typed surface a single MappedRegs<VirtioMmio> instead
# of two MappedRegs at adjacent offsets. When Phase X converts another
# virtio device type (net, gpu), we either rename the config block or
# split into per-device-type specs.

[device]
name = "VirtioMmio"
description = "VirtIO MMIO transport registers + virtio-blk config space"
emit = true
# Phase 4A.4: cross-check generated register offsets against the
# hand-written constants in lockjaw_types::virtio. Bindings below
# (in [[verify_offsets]]) connect register names to const names;
# moving a constant breaks the generated module's test build.
verify_against = "lockjaw_types::virtio"

# ---------------------------------------------------------------------------
# Read-only identification (spec 4.2.2.1)
# ---------------------------------------------------------------------------

[[registers]]
name = "magic_value"
offset = 0x000
width = 32
access = "ro"
description = "Magic 0x74726976 ('virt' LE) — bad value = not a virtio device"

[[registers]]
name = "version"
offset = 0x004
width = 32
access = "ro"
description = "Transport version (2 for modern devices)"

[[registers]]
name = "device_id"
offset = 0x008
width = 32
access = "ro"
description = "DeviceID (1=net, 2=block, 16=gpu, 0=no device)"

[[registers]]
name = "vendor_id"
offset = 0x00c
width = 32
access = "ro"
description = "VendorID"

# ---------------------------------------------------------------------------
# Feature negotiation (windowed — sel picks the 32-bit window).
# Driver writes sel, then reads device_features or writes driver_features.
# ---------------------------------------------------------------------------

[[registers]]
name = "device_features"
offset = 0x010
width = 32
access = "ro"
description = "Device features (window selected by device_features_sel)"

[[registers]]
name = "device_features_sel"
offset = 0x014
width = 32
access = "wo"
description = "Window selector for device_features (0 = low 32, 1 = high 32)"

[[registers]]
name = "driver_features"
offset = 0x020
width = 32
access = "wo"
description = "Accepted driver features (window selected by driver_features_sel)"

[[registers]]
name = "driver_features_sel"
offset = 0x024
width = 32
access = "wo"
description = "Window selector for driver_features"

# ---------------------------------------------------------------------------
# Virtqueue setup (spec 4.2.2.2)
# ---------------------------------------------------------------------------

[[registers]]
name = "queue_sel"
offset = 0x030
width = 32
access = "wo"
description = "Select virtqueue index for subsequent queue_* operations"

[[registers]]
name = "queue_num_max"
offset = 0x034
width = 32
access = "ro"
description = "Maximum queue size for the selected virtqueue (0 = unavailable)"

[[registers]]
name = "queue_num"
offset = 0x038
width = 32
access = "wo"
description = "Negotiated queue size for the selected virtqueue"

[[registers]]
name = "queue_ready"
offset = 0x044
width = 32
access = "rw"
description = "1 = queue armed; write 0 to reset (driver-controlled)"

[[registers]]
name = "queue_notify"
offset = 0x050
width = 32
access = "trigger"
description = "Notify the device of new descriptors (value = queue index)"

# ---------------------------------------------------------------------------
# Interrupts (spec 4.2.2.3)
# ---------------------------------------------------------------------------

[[registers]]
name = "interrupt_status"
offset = 0x060
width = 32
access = "ro"
description = "Pending interrupt cause bits (bit 0 = used-buffer, bit 1 = config-change)"

[[registers]]
name = "interrupt_ack"
offset = 0x064
width = 32
access = "w1c"
description = "Acknowledge bits set in interrupt_status (write the same value back)"

# ---------------------------------------------------------------------------
# Device status state machine (spec 3.1.1)
# ---------------------------------------------------------------------------

[[registers]]
name = "status"
offset = 0x070
width = 32
access = "rw"
description = "Device status flags — drives the init state machine"
flags = [
    { name = "acknowledge", bit = 0, description = "Driver has noticed the device" },
    { name = "driver", bit = 1, description = "Driver knows how to drive the device" },
    { name = "driver_ok", bit = 2, description = "Driver is ready to drive" },
    { name = "features_ok", bit = 3, description = "Features negotiation complete" },
    { name = "needs_reset", bit = 6, description = "Device wants reset" },
    { name = "failed", bit = 7, description = "Fatal init error" },
]

# ---------------------------------------------------------------------------
# Queue physical-address registers (spec 4.2.2.2).
# 64-bit PAs are split into low/high 32-bit halves. Future phase: model
# as `kind = "combined_trigger"` on a 64-bit logical address so the
# spec carries the "write both halves" semantic. Phase 3 keeps it
# explicit: driver shifts and writes two 32-bit registers.
# ---------------------------------------------------------------------------

[[registers]]
name = "queue_desc_low"
offset = 0x080
width = 32
access = "wo"
description = "Descriptor table PA, low 32 bits"

[[registers]]
name = "queue_desc_high"
offset = 0x084
width = 32
access = "wo"
description = "Descriptor table PA, high 32 bits"

[[registers]]
name = "queue_driver_low"
offset = 0x090
width = 32
access = "wo"
description = "Available ring PA, low 32 bits (driver-area)"

[[registers]]
name = "queue_driver_high"
offset = 0x094
width = 32
access = "wo"
description = "Available ring PA, high 32 bits"

[[registers]]
name = "queue_device_low"
offset = 0x0a0
width = 32
access = "wo"
description = "Used ring PA, low 32 bits (device-area)"

[[registers]]
name = "queue_device_high"
offset = 0x0a4
width = 32
access = "wo"
description = "Used ring PA, high 32 bits"

# ---------------------------------------------------------------------------
# virtio-blk config space (offset 0x100, spec 5.2.4).
# Capacity is a le64 split across two 32-bit reads.
# ---------------------------------------------------------------------------

[[registers]]
name = "blk_capacity_low"
offset = 0x100
width = 32
access = "ro"
description = "Block device capacity, low 32 bits (sectors of 512 bytes)"

[[registers]]
name = "blk_capacity_high"
offset = 0x104
width = 32
access = "ro"
description = "Block device capacity, high 32 bits"

# ---------------------------------------------------------------------------
# Phase 4A.2 — synthesized 64-bit accessors for register pairs.
# Replaces driver-side `low | (high << 32)` composition.
# ---------------------------------------------------------------------------

[[u64_pairs]]
name = "blk_capacity"
low = "blk_capacity_low"
high = "blk_capacity_high"

[[u64_pairs]]
name = "queue_desc"
low = "queue_desc_low"
high = "queue_desc_high"

[[u64_pairs]]
name = "queue_driver"
low = "queue_driver_low"
high = "queue_driver_high"

[[u64_pairs]]
name = "queue_device"
low = "queue_device_low"
high = "queue_device_high"

# ---------------------------------------------------------------------------
# Phase 4A.3 — synthesized 64-bit accessors for windowed registers
# (selector + value pair). Replaces driver-side sel-write/value-access
# choreography during feature negotiation.
# ---------------------------------------------------------------------------

[[windowed]]
name = "device_features"
selector = "device_features_sel"
value = "device_features"
chunk_width = 32
chunk_count = 2
direction = "read"

[[windowed]]
name = "driver_features"
selector = "driver_features_sel"
value = "driver_features"
chunk_width = 32
chunk_count = 2
direction = "write"

# ---------------------------------------------------------------------------
# Phase 4A.4 — verify_against bindings: cross-check generated offsets
# against lockjaw_types::virtio constants at test-build time. Bindings
# omit blk_capacity_* (no per-half constants in lockjaw-types — only
# VIRTIO_BLK_CFG_CAPACITY at 0x100). Coverage report in the generated
# file's header surfaces unmatched registers.
# ---------------------------------------------------------------------------

[[verify_offsets]]
reg = "magic_value"
const = "VIRTIO_MMIO_MAGIC"

[[verify_offsets]]
reg = "version"
const = "VIRTIO_MMIO_VERSION"

[[verify_offsets]]
reg = "device_id"
const = "VIRTIO_MMIO_DEVICE_ID"

[[verify_offsets]]
reg = "vendor_id"
const = "VIRTIO_MMIO_VENDOR_ID"

[[verify_offsets]]
reg = "device_features"
const = "VIRTIO_MMIO_DEVICE_FEATURES"

[[verify_offsets]]
reg = "device_features_sel"
const = "VIRTIO_MMIO_DEVICE_FEATURES_SEL"

[[verify_offsets]]
reg = "driver_features"
const = "VIRTIO_MMIO_DRIVER_FEATURES"

[[verify_offsets]]
reg = "driver_features_sel"
const = "VIRTIO_MMIO_DRIVER_FEATURES_SEL"

[[verify_offsets]]
reg = "queue_sel"
const = "VIRTIO_MMIO_QUEUE_SEL"

[[verify_offsets]]
reg = "queue_num_max"
const = "VIRTIO_MMIO_QUEUE_NUM_MAX"

[[verify_offsets]]
reg = "queue_num"
const = "VIRTIO_MMIO_QUEUE_NUM"

[[verify_offsets]]
reg = "queue_ready"
const = "VIRTIO_MMIO_QUEUE_READY"

[[verify_offsets]]
reg = "queue_notify"
const = "VIRTIO_MMIO_QUEUE_NOTIFY"

[[verify_offsets]]
reg = "interrupt_status"
const = "VIRTIO_MMIO_INTERRUPT_STATUS"

[[verify_offsets]]
reg = "interrupt_ack"
const = "VIRTIO_MMIO_INTERRUPT_ACK"

[[verify_offsets]]
reg = "status"
const = "VIRTIO_MMIO_STATUS"

[[verify_offsets]]
reg = "queue_desc_low"
const = "VIRTIO_MMIO_QUEUE_DESC_LOW"

[[verify_offsets]]
reg = "queue_desc_high"
const = "VIRTIO_MMIO_QUEUE_DESC_HIGH"

[[verify_offsets]]
reg = "queue_driver_low"
const = "VIRTIO_MMIO_QUEUE_DRIVER_LOW"

[[verify_offsets]]
reg = "queue_driver_high"
const = "VIRTIO_MMIO_QUEUE_DRIVER_HIGH"

[[verify_offsets]]
reg = "queue_device_low"
const = "VIRTIO_MMIO_QUEUE_DEVICE_LOW"

[[verify_offsets]]
reg = "queue_device_high"
const = "VIRTIO_MMIO_QUEUE_DEVICE_HIGH"
